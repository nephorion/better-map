[phases.setup]
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python -m pip install uv && cd backend && python -m uv sync --frozen",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && PYTHONPATH=src .venv/bin/uvicorn better_map.api.app:app --host 0.0.0.0 --port ${PORT:-8112}"
