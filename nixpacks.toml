[phases.setup]
nixPkgs = ["python311", "nodejs_20", "curl"]

[phases.install]
cmds = [
  "curl -LsSf https://astral.sh/uv/install.sh | sh && cd backend && ~/.local/bin/uv sync --frozen",
  "cd frontend && npm ci"
]

[phases.build]
cmds = [
  "cd frontend && npm run build"
]

[start]
cmd = "cd backend && PYTHONPATH=src .venv/bin/uvicorn better_map.api.app:app --host 0.0.0.0 --port ${PORT:-8112}"
